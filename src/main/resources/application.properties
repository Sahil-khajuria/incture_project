spring.application.name=erasm
spring.datasource.url=jdbc:mysql://localhost:3306/erasm_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Sahil@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
jwt.secret=${JWT_SECRET:erasm-default-secret-change-in-production-256-bits-key-here}
jwt.access-token-expiry=${JWT_ACCESS_EXPIRY:900000}
jwt.refresh-token-expiry=${JWT_REFRESH_EXPIRY:604800000}
security.account.max-failed-attempts=5
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
logging.level.com.erasm=INFO
logging.level.org.springframework.security=WARN
logging.file.name=logs/erasm.log
